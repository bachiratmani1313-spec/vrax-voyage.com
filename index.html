<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrax Voyage | Comparateur & Boutique</title>
    <style>
        :root {
            --primary: #2563eb;
            --accent: #f59e0b;
            --dark: #0f172a;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--dark);
            line-height: 1.6;
        }

        .navbar {
            background: var(--dark);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { color: white; font-weight: 800; font-size: 1.4rem; text-decoration: none; }

        .container {
            max-width: 1200px;
            margin: 2rem auto 4rem;
            padding: 0 1rem;
        }

        .section-box {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            overflow: hidden; /* Important pour les grands widgets */
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
        }

        /* GESTION DES CARTES (DESKTOP vs MOBILE) */
        .map-desktop { display: block; }
        .map-mobile { display: none; }

        @media (max-width: 768px) {
            .map-desktop { display: none; }
            .map-mobile { display: block; }
            .container { margin-top: 1rem; }
        }

        /* BOUTIQUE */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: white;
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }

        .btn-amazon {
            display: block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 15px;
        }

        footer { background: var(--dark); color: #64748b; padding: 3rem; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">Vrax Voyage</a>
    </nav>

    <div class="container">

        <section class="section-box">
            <div class="section-title">Trouvez votre vol</div>
            <script async src="https://tpemd.com/content?currency=eur&trs=499802&shmarker=704469.704469&show_hotels=false&powered_by=false&locale=fr&searchUrl=www.aviasales.fr%2Fsearch&primary_override=%232563eb&color_button=%232563eb&border_radius=8&promo_id=7879&campaign_id=100" charset="utf-8"></script>
        </section>

        <section class="section-box" id="carte">
            <div class="section-title">Carte interactive des tarifs</div>
            
            <div class="map-desktop">
                <script async src="https://tpemd.com/content?currency=eur&trs=499802&shmarker=704469.704469&lat=&lng=&powered_by=true&search_host=www.aviasales.com%2Fsearch&locale=en&origin=LON&value_min=0&value_max=1000000&round_trip=true&only_direct=false&radius=1&draggable=true&disable_zoom=false&show_logo=false&scrollwheel=false&primary=%233FABDB&secondary=%233FABDB&light=%23ffffff&width=1500&height=500&zoom=2&promo_id=4054&campaign_id=100" charset="utf-8"></script>
            </div>

            <div class="map-mobile">
                <script async src="https://tpemd.com/content?currency=eur&trs=499802&shmarker=704469.704469&lat=&lng=&powered_by=true&search_host=www.aviasales.com%2Fsearch&locale=en&origin=LON&value_min=0&value_max=1000000&round_trip=true&only_direct=false&radius=1&draggable=true&disable_zoom=false&show_logo=false&scrollwheel=false&primary=%233FABDB&secondary=%233FABDB&light=%23ffffff&width=1500&height=500&zoom=2&promo_id=4054&campaign_id=100" charset="utf-8"></script>
            </div>
        </section>

        <section class="section-box" id="boutique">
            <div class="section-title">Boutique Voyage (vrax-21)</div>
            <div class="shop-grid">
                <div class="product-card">
                    <div style="font-size: 40px;">🧳</div>
                    <div style="font-weight: 700;">Bagages & Valises</div>
                    <a href="https://www.amazon.fr/s?k=valise+voyage&tag=vrax-21" target="_blank" class="btn-amazon">Voir sur Amazon</a>
                </div>
                <div class="product-card">
                    <div style="font-size: 40px;">🔌</div>
                    <div style="font-weight: 700;">Accessoires Tech</div>
                    <a href="https://www.amazon.fr/s?k=accessoires+voyage&tag=vrax-21" target="_blank" class="btn-amazon">Voir sur Amazon</a>
                </div>
            </div>
        </section>

    </div>

    <footer>
        <p>© 2026 Vrax Voyage | Partner ID: 704469 | Amazon: vrax-21</p>
    </footer>

    <script async src="https://tpembars.com/NDk5ODAy.js?t=499802"></script>
</body>
</html>
