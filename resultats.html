<style>
  :root{--ink:#0E1A2B;--paper:#FAF7F2;--amber:#EE7B33;--text:#14202E;--muted:#5E6B7A;--line:rgba(20,32,46,.10)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--text);background:var(--paper);line-height:1.55}
  .wrap{width:min(1120px,92vw);margin-inline:auto}
  a{color:inherit;text-decoration:none}
  h1{font-family:"Space Grotesk",sans-serif;letter-spacing:-.02em}
  header{position:sticky;top:0;z-index:50;background:rgba(14,26,43,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}

  .brand{display:flex;align-items:center;gap:10px;color:#fff;font-family:"Space Grotesk";font-weight:700;font-size:20px}
  .brand .dot{display:grid;place-items:center;width:34px;height:34px;border-radius:10px;background:var(--amber);color:#fff;font-size:18px;transform:rotate(-8deg)}
  .back{color:#cdd6e2;font-size:14px;font-weight:500}
  .back:hover{color:#fff}
  .title{padding:30px 0 6px}
  .title .eye{font-family:"Space Mono";font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}
  .title h1{font-size:clamp(24px,4vw,32px);margin-top:6px}
  .panel{background:#fff;border-radius:16px;box-shadow:0 18px 50px -18px rgba(14,26,43,.30);padding:14px 16px;margin:18px 0}
  #tpwl-tickets{margin-top:18px;min-height:200px}
  footer{background:var(--ink);color:#9fb2c6;padding:28px 0;margin-top:40px;font-size:12.5px}
